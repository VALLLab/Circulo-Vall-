<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Círculo VALL</title>
<meta name="description" content="Herramienta de práctica artística — VALL">
<meta name="theme-color" content="#0e0c18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Círculo VALL">
<link rel="manifest" href="manifest.json">
<!-- Ícono para iOS (se genera inline más abajo) -->
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0c18;--bgCard:#16132a;--bgHover:#1e1a38;
  --violet:#9b7fe8;--violetL:#c4aff5;--violetD:#6b4fc8;
  --white:#f5f0ec;--whiteM:rgba(245,240,236,0.65);
  --whiteS:rgba(245,240,236,0.35);--whiteXS:rgba(245,240,236,0.15);
  --border:rgba(155,127,232,0.28);--borderL:rgba(155,127,232,0.55);
  --green:#5ecf82;
}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:Georgia,'Times New Roman',serif;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:44px 22px;position:relative}
.screen.active{display:flex}
.screen-top{padding-top:64px}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(14,12,24,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--whiteXS)}
#nav button{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;color:var(--whiteS);transition:color .2s;padding:5px 8px}
#nav button:hover,#nav button:active{color:var(--whiteM)}
#nav .brand{color:var(--violetL);letter-spacing:.22em;font-size:10px}
#nav .nav-right{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
#nav .btn-bosque{border:1px solid rgba(94,207,130,.25);color:rgba(94,207,130,.7)!important}
#nav .btn-proy{border:1px solid var(--border);color:var(--violetL)!important}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.5;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E")}

/* ── RITUAL ── */
#ld{width:8px;height:8px;border-radius:50%;background:var(--white);animation:glow 2.4s ease infinite,bob 5s ease infinite;box-shadow:0 0 10px rgba(245,240,236,.4),0 0 24px rgba(107,79,200,.55);margin-bottom:48px}
#ritual-lines{display:flex;flex-direction:column;gap:14px;max-width:330px;margin-bottom:50px;text-align:center}
.rl{opacity:0;font-family:Georgia,serif;font-style:italic;font-size:clamp(17px,4vw,21px);line-height:1.58;animation:ap .85s ease forwards}
#ritual-btns{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;animation:ap .7s .2s forwards}
#btn-entrar{background:none;border:none;font-family:'Courier New',monospace;font-size:10px;letter-spacing:.36em;text-transform:uppercase;cursor:pointer;color:var(--white);padding:10px 0}
.btn-game{background:none;border:1px solid rgba(94,207,130,.25);color:rgba(94,207,130,.55);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;padding:8px 14px;transition:all .25s}
.btn-game:hover,.btn-game:active{border-color:rgba(94,207,130,.55);color:rgba(94,207,130,.9)}
.btn-proy-r{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;color:var(--violetL);opacity:.6;padding:8px 14px}
.ritual-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ── PREGUNTA ── */
#pregunta-txt{font-family:Georgia,serif;font-style:italic;font-size:clamp(22px,6vw,32px);line-height:1.38;color:var(--white);margin-bottom:40px;text-align:center;max-width:360px;animation:ap .6s ease both}
.opt-btn{display:block;width:100%;max-width:400px;padding:15px 20px;background:var(--bgCard);border:1px solid var(--border);color:var(--white);font-family:'Courier New',monospace;font-size:11px;letter-spacing:.1em;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:8px}
.opt-btn:hover,.opt-btn:active{background:var(--bgHover);border-color:var(--borderL);padding-left:26px}
#btn-azar{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;color:var(--whiteS);padding:14px 0}
#btn-azar:hover{color:var(--whiteM)}

/* ── SOBRE / CARTA ── */
#carta-label{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.4em;color:var(--whiteS);text-transform:uppercase;margin-bottom:20px;align-self:flex-start;max-width:400px;width:100%}
.sobre-wrap{width:100%;max-width:400px}
.sobre-cerrado{background:var(--bgCard);border:1px solid var(--border);border-radius:4px;position:relative;min-height:168px;overflow:hidden;box-shadow:0 6px 38px rgba(0,0,0,.52);cursor:pointer;-webkit-user-select:none;user-select:none}
.sobre-tap{text-align:center;margin-top:16px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.3em;color:var(--whiteXS);text-transform:uppercase}
.seal{animation:sealBeat 2.5s ease infinite}
.sobre-label{position:absolute;bottom:11px;left:15px;font-family:'Courier New',monospace;font-size:8px;letter-spacing:.36em;text-transform:uppercase;opacity:.66}
.sobre-blur{padding:98px 26px 42px;filter:blur(3px);opacity:.07;pointer-events:none;font-family:Georgia,serif;font-size:12px;line-height:1.7}
.papel{background:#100e1e;border-radius:2px;padding:22px 20px 18px;position:relative;margin:18px 13px 13px}
.papel-titulo{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.36em;text-transform:uppercase;margin-bottom:14px;opacity:.66}
.papel-cuerpo{font-family:Georgia,'Times New Roman',serif;font-size:clamp(14px,3.8vw,17px);line-height:1.85;color:var(--white);margin-bottom:20px}
.papel-autor{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.12em;color:var(--whiteS);border-top:1px solid rgba(255,255,255,.06);padding-top:12px}
.sobre-abierto{background:var(--bgCard);border:1px solid var(--border);border-radius:4px;overflow:visible;position:relative;box-shadow:0 6px 38px rgba(0,0,0,.42);animation:openCard .48s ease both}

/* ── ACCIONES CARTA ── */
#carta-acciones{width:100%;max-width:400px;margin-top:26px;animation:ap .42s ease both}
.registro-label{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.26em;color:var(--whiteS);text-transform:uppercase;margin-bottom:8px}
#nota-txt{width:100%;background:var(--bgCard);border:none;border-bottom:1px solid var(--border);color:var(--white);font-family:Georgia,serif;font-size:16px;font-style:italic;line-height:1.78;padding:11px 4px;resize:none;outline:none;min-height:74px;display:block}
#nota-txt::placeholder{color:var(--whiteXS)}
#btn-guardar{background:none;border:1px solid var(--border);color:var(--whiteM);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.24em;text-transform:uppercase;padding:10px 17px;cursor:pointer;width:100%;margin:14px 0 24px;transition:all .28s}
#btn-guardar:hover,#btn-guardar.saved{background:var(--bgHover);border-color:var(--borderL);color:var(--white)}
.sep{height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);margin-bottom:22px}
.otra-label{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.26em;color:var(--whiteS);text-transform:uppercase;margin-bottom:10px}
.tipo-btns{display:flex;flex-wrap:wrap;gap:7px}
.tipo-btn{background:none;border:1px solid var(--border);padding:7px 13px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;color:var(--whiteS);transition:all .18s}
.tipo-btn:hover,.tipo-btn:active{background:var(--bgHover);color:var(--white);border-color:var(--borderL)}

/* ── CARTA DEL DÍA ── */
#cdd-fecha{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.35em;color:var(--whiteS);text-transform:uppercase;margin-bottom:6px;text-align:center}
#cdd-label{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.35em;text-transform:uppercase;text-align:center;margin-bottom:22px}
#btn-entrar-circulo{background:none;border:1px solid var(--border);color:var(--whiteM);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;padding:11px 26px;transition:all .25s;margin-top:22px;animation:ap .5s .15s both;display:none}
#btn-entrar-circulo:hover{border-color:var(--borderL);color:var(--white)}

/* ── PROYECCIÓN ── */
#proy-label{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.4em;color:var(--whiteS);text-transform:uppercase;margin-bottom:24px}
#btn-siguiente{background:none;border:1px solid var(--border);color:var(--whiteM);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;padding:11px 26px;transition:all .28s;margin-top:22px;display:none}
#btn-siguiente:hover{border-color:var(--borderL);color:var(--white)}
#btn-salir-proy{position:fixed;top:17px;right:20px;background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.26em;color:var(--whiteS);text-transform:uppercase;cursor:pointer;z-index:200}

/* ── ARCHIVO ── */
#archivo-titulo{font-family:Georgia,serif;font-style:italic;font-size:27px;color:var(--white);margin-bottom:36px;align-self:flex-start;max-width:400px;width:100%}
#archivo-sub{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.38em;color:var(--whiteS);text-transform:uppercase;margin-bottom:7px}
#archivo-lista{width:100%;max-width:400px}
.archivo-item{padding:22px 0;border-bottom:1px solid var(--whiteXS);animation:ap .42s ease both}
.archivo-tipo{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.24em;text-transform:uppercase}
.archivo-ts{font-family:'Courier New',monospace;font-size:8px;color:var(--whiteS)}
.archivo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.archivo-texto{font-family:Georgia,serif;font-size:15px;color:var(--whiteM);line-height:1.8;margin-bottom:0}
.archivo-nota{font-family:Georgia,serif;font-size:14px;color:rgba(245,240,236,.5);line-height:1.66;border-left:2px solid var(--border);padding-left:13px;font-style:italic;margin-top:10px}
#archivo-empty{text-align:center;padding-top:60px;width:100%}
#archivo-empty p{font-family:Georgia,serif;font-style:italic;font-size:18px;color:var(--whiteS);line-height:1.72;margin-top:24px}
#btn-volver-archivo{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;color:var(--whiteS);padding:7px 0;margin-top:38px;display:block;text-align:center}
#btn-volver-archivo:hover{color:var(--whiteM)}

/* ── BOSQUE ── */
#bosque-wrap{width:100%;height:100vh;max-height:100vh;background:#04050a;display:flex;flex-direction:column;overflow:hidden;position:relative}
#bosque-canvas{display:block;width:100%;height:100%;flex:1;touch-action:none}
#bosque-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:9px 13px;z-index:5;pointer-events:none}
#bosque-top span{font-family:'Courier New',monospace;font-size:9px;letter-spacing:.2em;color:rgba(94,207,130,.55);text-transform:uppercase}
#btn-bosque-volver{pointer-events:all;background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.2em;color:var(--whiteXS);text-transform:uppercase;cursor:pointer;padding:6px 8px}
#bosque-hint{position:absolute;bottom:134px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:.14em;color:var(--whiteXS);text-transform:uppercase;white-space:nowrap;pointer-events:none}
#bosque-msg{position:absolute;top:20%;left:50%;font-family:Georgia,serif;font-style:italic;font-size:15px;pointer-events:none;text-shadow:0 0 18px rgba(94,207,130,.6);white-space:nowrap;z-index:10;display:none;animation:bmp .44s ease both;color:var(--green)}
#joystick-wrap{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:5}
#joystick-base{width:104px;height:104px;border-radius:50%;background:rgba(14,12,24,.72);border:1px solid rgba(94,207,130,.32);position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
#joystick-ring{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(94,207,130,.18)}
#joystick-knob{position:absolute;top:50%;left:50%;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#5ecf82 52%,transparent 100%);box-shadow:0 0 13px rgba(94,207,130,.6);transform:translate(-50%,-50%);pointer-events:none}

/* ── MI PRÁCTICA ── */
#practica-intro{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:0}
#practica-eyebrow{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.42em;color:rgba(196,175,245,.55);text-transform:uppercase;margin-bottom:14px}
#practica-titulo{font-family:Georgia,serif;font-style:italic;font-size:clamp(26px,7vw,36px);color:var(--white);margin-bottom:10px;text-align:center;line-height:1.2}
#practica-sub{font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--whiteS);line-height:1.7;text-align:center;margin-bottom:32px;max-width:320px}
.prac-area{display:block;width:100%;padding:16px 20px;background:var(--bgCard);border:1px solid var(--border);color:var(--white);font-family:'Courier New',monospace;font-size:10px;letter-spacing:.08em;cursor:pointer;text-align:left;transition:all .22s;margin-bottom:9px;position:relative}
.prac-area:hover,.prac-area:active{background:var(--bgHover);border-color:var(--borderL);padding-left:26px}
.prac-area-name{display:block;font-size:11px;letter-spacing:.12em;margin-bottom:3px}
.prac-area-desc{display:block;font-size:9px;color:var(--whiteS);letter-spacing:.06em}

/* chat */
#practica-chat{width:100%;max-width:480px;display:flex;flex-direction:column;height:100vh;max-height:100vh}
#chat-header{padding:12px 16px;border-bottom:1px solid var(--whiteXS);display:flex;align-items:center;gap:10;justify-content:space-between;flex-shrink:0;background:var(--bg)}
#chat-area-label{font-family:'Courier New',monospace;font-size:8px;letter-spacing:.32em;color:var(--violetL);text-transform:uppercase}
#btn-chat-volver{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.2em;color:var(--whiteS);cursor:pointer;text-transform:uppercase;padding:4px 0}
#chat-msgs{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:88%;animation:ap .35s ease both}
.msg-claude{align-self:flex-start}
.msg-user{align-self:flex-end}
.msg-bubble{padding:13px 16px;border-radius:3px;line-height:1.72;font-size:15px}
.msg-claude .msg-bubble{background:var(--bgCard);border:1px solid var(--border);font-family:Georgia,serif;font-style:italic;color:var(--white)}
.msg-user .msg-bubble{background:#1e1a38;border:1px solid rgba(155,127,232,.35);font-family:Georgia,serif;color:var(--whiteM)}
.msg-typing .msg-bubble{color:var(--whiteS)}
.msg-typing .dot{display:inline-block;animation:dotPulse 1.2s ease infinite}
.msg-typing .dot:nth-child(2){animation-delay:.2s}
.msg-typing .dot:nth-child(3){animation-delay:.4s}
#chat-input-wrap{padding:12px 14px;border-top:1px solid var(--whiteXS);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;background:var(--bg)}
#chat-input{flex:1;background:var(--bgCard);border:1px solid var(--border);color:var(--white);font-family:Georgia,serif;font-size:15px;font-style:italic;padding:10px 13px;resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.6;border-radius:2px}
#chat-input::placeholder{color:var(--whiteXS)}
#btn-send{background:none;border:1px solid var(--borderL);color:var(--violetL);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;padding:10px 13px;transition:all .2s;white-space:nowrap;flex-shrink:0}
#btn-send:hover{background:var(--bgHover);color:var(--white)}
#btn-send:disabled{opacity:.3;cursor:default}

@keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ── ANIMACIONES ── */
@keyframes ap{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.38}50%{opacity:.95}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes openCard{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes sealBeat{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes bmp{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .4s ease both}

/* ── UTILIDADES ── */
.hidden{display:none!important}
.nb{background:none;border:none;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;cursor:pointer;color:var(--whiteS);padding:7px 0}
.nb:hover{color:var(--whiteM)}
</style>
</head>
<body>
<div id="grain"></div>

<!-- NAV (oculto en carta del día y bosque) -->
<nav id="nav" class="hidden">
  <button class="brand" onclick="irRitual()">◌ CÍRCULO VALL</button>
  <div class="nav-right">
    <button class="btn-bosque" onclick="irBosque()">◈ bosque</button>
    <button style="border:1px solid rgba(196,175,245,.25);color:rgba(196,175,245,.7)!important" onclick="irPractica()">✦ práctica</button>
    <button class="btn-proy" onclick="irProyeccion()">⊡ proyectar</button>
    <button id="nav-archivo" onclick="irArchivo()">archivo</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════
     CARTA DEL DÍA
════════════════════════════════════════════════════════ -->
<div id="screen-cdd" class="screen active">
  <div id="cdd-fecha"></div>
  <div id="cdd-label"></div>
  <div id="cdd-sobre" class="sobre-wrap"></div>
  <button id="btn-entrar-circulo" onclick="irRitual()">entrar al círculo →</button>
</div>

<!-- ═══════════════════════════════════════════════════════
     RITUAL
════════════════════════════════════════════════════════ -->
<div id="screen-ritual" class="screen">
  <div id="ld"></div>
  <div id="ritual-lines"></div>
  <div id="ritual-btns">
    <button id="btn-entrar" onclick="irPregunta()">entrar al círculo →</button>
    <div class="ritual-row">
      <button class="btn-game" onclick="irBosque()">◈ el bosque</button>
      <button class="btn-game" style="border-color:rgba(196,175,245,.25);color:rgba(196,175,245,.6)" onclick="irPractica()">✦ mi práctica</button>
      <button class="btn-proy-r" onclick="irProyeccion()">⊡ proyectar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     PREGUNTA
════════════════════════════════════════════════════════ -->
<div id="screen-pregunta" class="screen screen-top">
  <div id="ld2" style="width:6px;height:6px;border-radius:50%;background:var(--white);animation:glow 2.4s ease infinite,bob 5s ease infinite;box-shadow:0 0 8px rgba(245,240,236,.35);margin-bottom:40px"></div>
  <div id="pregunta-txt"></div>
  <div id="opciones" style="width:100%;max-width:400px"></div>
  <button id="btn-azar" onclick="elegirAzar()">el azar decide</button>
</div>

<!-- ═══════════════════════════════════════════════════════
     CARTA
════════════════════════════════════════════════════════ -->
<div id="screen-carta" class="screen screen-top" style="align-items:flex-start;padding:64px 22px 38px">
  <div id="carta-label"></div>
  <div id="carta-sobre" class="sobre-wrap"></div>
  <div id="carta-acciones" class="hidden">
    <div class="registro-label">tu registro</div>
    <textarea id="nota-txt" placeholder="Lo que surge, lo que sentís, lo que te incomoda…" rows="3"></textarea>
    <button id="btn-guardar" onclick="guardar()">guardar en el archivo</button>
    <div class="sep"></div>
    <div class="otra-label">otra carta</div>
    <div class="tipo-btns" id="tipo-btns"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     PROYECCIÓN
════════════════════════════════════════════════════════ -->
<div id="screen-proyeccion" class="screen">
  <button id="btn-salir-proy" onclick="irPregunta()">salir ←</button>
  <div id="proy-label">modo proyección</div>
  <div id="proy-sobre" class="sobre-wrap"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATOS
// ═══════════════════════════════════════════════════════════
const CARTAS = {
  fluxus:[
    {tipo:"fluxus",titulo:"Instrucción",narrativa:true,contenido:"Estaba en un taller en Berlín. Yoko Ono entró, no dijo nada, y nos pidió que miráramos nuestras manos durante un minuto sin hacer ninguna otra cosa. Tres personas lloraron. Nadie sabe bien por qué. Mirá las tuyas ahora.",autor:"Yoko Ono, adaptación"},
    {tipo:"fluxus",titulo:"Instrucción",narrativa:true,contenido:"Vi a Maciunas escribir una instrucción en una servilleta de café: nombrá algo que siempre estuvo ahí y nunca tuvo nombre. La dobló y se la dio a un desconocido. Elegí un objeto de este cuarto. Dale un nombre que no existe todavía.",autor:"George Maciunas, adaptación"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Escribile una carta a alguien que todavía no nació. No le expliques el mundo. Contale una sola cosa que aprendiste solo, sin que nadie te la enseñara.",autor:"Yoko Ono, Grapefruit"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Hacé un sonido que nunca hayas hecho antes. Solo uno. Esperá un momento. ¿Era más tuyo de lo que esperabas?",autor:"Ejercicio Fluxus"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Caminá hacia algo del espacio que siempre ignorás. Quedáte ahí cinco minutos. Miralo como si fuera lo único que existe.",autor:"Yoko Ono, adaptación"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Hay algo que querés olvidar. No lo escribas entero. Escribí solo la primera letra. Doblá el papel. Guardalo en un lugar que no sea tu bolsillo.",autor:"Ejercicio Fluxus"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Mirá tus manos durante exactamente un minuto. No hagas nada más. Solo mirá.",autor:"Yoko Ono"},
    {tipo:"fluxus",titulo:"Instrucción",contenido:"Elegí un objeto del espacio. Nombralo como si nadie lo hubiera visto nunca antes. Presentáselo al grupo como si fuera un hallazgo.",autor:"Ejercicio Fluxus"},
  ],
  grotowski:[
    {tipo:"grotowski",titulo:"Presencia",narrativa:true,contenido:"Grotowski dijo en un ensayo que duró diez horas que el teatro empieza cuando alguien cruza un umbral sabiendo que lo cruza. Le pregunté cuándo había cruzado él el último. Dijo, después de una pausa larga: esta mañana. ¿Cuándo cruzaste vos uno hoy?",autor:"Grotowski, Hacia un teatro pobre"},
    {tipo:"grotowski",titulo:"Pobreza",narrativa:true,contenido:"Alguien le preguntó a Grotowski en Florencia qué le sacaría al teatro si pudiera quedarse con una sola cosa. Hizo silencio. Después dijo: el encuentro. Todo lo demás se puede ir. ¿Qué le sacarías a tu práctica y que todavía siguiera siendo tuya?",autor:"Grotowski, teatro pobre"},
    {tipo:"grotowski",titulo:"Ejercicio de presencia",contenido:"De pie. Sentí el peso del cuerpo en los pies. Subí esa atención lentamente: rodillas, cadera, pecho, garganta. ¿Dónde encontrás el bloqueo hoy?",autor:"Grotowski, Hacia un teatro pobre"},
    {tipo:"grotowski",titulo:"Impulso",contenido:"Encontrá el impulso más pequeño que podés hacer con una mano. Tan pequeño que casi no se vea. Ahora dejalo crecer solo, sin apurarlo, hasta que ocupe todo el cuerpo.",autor:"Grotowski, técnica del impulso"},
    {tipo:"grotowski",titulo:"Resonadores",contenido:"Emití un sonido desde el vientre. Luego desde el pecho. Luego desde la cabeza. ¿Cuál se siente más tuyo hoy? ¿Cuándo fue la última vez que hablaste desde ahí?",autor:"Grotowski, trabajo vocal"},
    {tipo:"grotowski",titulo:"Via negativa",contenido:"Dos minutos. No actúes. No expreses nada. No quieras comunicar nada. Solo existí en el espacio. ¿Qué apareció cuando dejaste de intentar?",autor:"Grotowski, via negativa"},
    {tipo:"grotowski",titulo:"La partitura",contenido:"Pensá en una acción física que hiciste hoy. Repetila tres veces exactamente igual. En la cuarta, cambiá algo tan pequeño que nadie lo note. ¿Qué cambió?",autor:"Grotowski, partitura de acciones"},
    {tipo:"grotowski",titulo:"Contacto",contenido:"Mirá a alguien del grupo sin querer decirle nada. Sin mensaje, sin intención. Como se mira un paisaje cuando uno está solo y no sabe que es feliz.",autor:"Grotowski, ejercicio de contacto"},
  ],
  surreal:[
    {tipo:"surreal",titulo:"Imagen",narrativa:true,contenido:"En el café Cyrano en Paris, Breton solía decir que el surrealismo no inventa nada: escucha. ¿Cuál fue la última imagen que tuviste antes de despertar hoy? Si no recordás, inventá una. ¿Qué te dice?",autor:"André Breton, adaptación"},
    {tipo:"surreal",titulo:"El objeto",narrativa:true,contenido:"Perdí una campera azul en un viaje a Santiago hace cinco años. A veces pienso dónde estará, si alguien la usa. Pensá en algo que perdiste. No una persona. Un objeto. ¿Dónde creés que está ahora mismo? ¿Qué está haciendo?",autor:"Imaginario surrealista"},
    {tipo:"surreal",titulo:"Asociación libre",contenido:"¿Qué animal sos hoy? ¿De qué color es ese animal? ¿Qué está haciendo ese animal ahora mismo en este cuarto?",autor:"Imaginario surrealista"},
    {tipo:"surreal",titulo:"La palabra",contenido:"Escribí la primera palabra que se te venga. Luego su opuesto. Luego lo que vive entre las dos. Eso es tu estado de hoy.",autor:"Técnica surrealista"},
    {tipo:"surreal",titulo:"Cadáver exquisito",contenido:"Completá sin pensarlo: 'El cuerpo del artista es una _______ que _______ cuando _______.' No lo edites.",autor:"Surrealismo, Paris 1925"},
    {tipo:"surreal",titulo:"La puerta",contenido:"Hay una puerta. No la que ves. La que imaginás ahora. Está un poco abierta. Escribí las primeras cinco palabras que se te vengan sobre lo que hay del otro lado. No las edites.",autor:"Imaginario surrealista"},
    {tipo:"surreal",titulo:"Mapa del cuerpo",contenido:"¿Qué parte de tu cuerpo sabés menos qué hacer con ella? Hoy esa parte dirige. Todo lo que hagas en los próximos diez minutos, que pase por ahí.",autor:"Escritura automática, adaptación"},
    {tipo:"surreal",titulo:"Imagen imposible",contenido:"Describí una imagen que no puede existir pero que sentís que ya viste. Una imagen que no tiene palabras exactas. Intentalo igual.",autor:"André Breton, adaptación"},
  ],
  teoria:[
    {tipo:"teoria",titulo:"Encuentro",narrativa:true,contenido:"Escuché a Grotowski dar una conferencia en Florencia. Alguien le preguntó qué era el teatro. Hizo una pausa larga. Después dijo: no el arte del actor, sino el arte del encuentro. Silencio total. ¿Con quién o con qué estás realmente en encuentro cuando trabajás?",autor:"Jerzy Grotowski"},
    {tipo:"teoria",titulo:"Visible",narrativa:true,contenido:"Klee lo escribió en su diario en 1915: el arte no reproduce lo visible, hace visible. Lo leí en una exposición en Berna. Salí a la calle y todo se veía distinto por un rato. ¿Qué estás haciendo visible que antes no lo era?",autor:"Paul Klee"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Tania Bruguera: el arte útil no representa la realidad, la transforma. ¿Para qué sirve concretamente lo que hacés? ¿A quién le cambia algo?",autor:"Tania Bruguera"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Lehmann: el teatro posdramático no cuenta una historia, produce una presencia. ¿Qué presencia produce tu trabajo cuando funciona bien? ¿Qué deja en el aire?",autor:"Hans-Thies Lehmann"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Rancière habla del espectador emancipado: no consume, participa, interpreta, transforma. ¿Cuándo fue la última vez que fuiste ese espectador? ¿Qué estabas viendo?",autor:"Jacques Rancière"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Fischer-Lichte: lo performativo no representa una acción, es la acción misma. ¿En qué parte de tu práctica todavía representás en vez de hacer?",autor:"Erika Fischer-Lichte"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Debord llamó deriva a pasar por ambientes distintos dejando que el espacio te afecte. ¿Por qué ambientes pasaste hoy? ¿Cuál te afectó sin que lo esperaras?",autor:"Guy Debord"},
    {tipo:"teoria",titulo:"Concepto",contenido:"Bourriaud propone el arte como estado de encuentro, no como objeto. ¿Qué estado de encuentro buscás en tu práctica? ¿Alguna vez lo lograste completo?",autor:"Nicolas Bourriaud"},
  ],
  grupo:[
    {tipo:"grupo",titulo:"Para el grupo",narrativa:true,contenido:"En un taller en São Paulo vi cómo un sonido pasó por doce personas y se convirtió en algo que ninguna hubiera inventado sola. Todos cierran los ojos. Uno empieza un sonido. El siguiente lo transforma apenas. Así hasta el final. ¿En qué se convirtió?",autor:"Ejercicio colectivo"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"Cada persona escribe en un papel una pregunta que no se anima a hacer en voz alta. Se doblan, se mezclan. Alguien las lee todas como si fueran propias. El grupo escucha sin reírse.",autor:"Ejercicio de confianza colectiva"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"Un voluntario al centro. El grupo lo mira en silencio durante dos minutos completos. Sin gesticular, sin reírse. Solo mirar. Al final: ¿qué vieron que no esperaban?",autor:"Grotowski, mirada colectiva"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"El grupo camina por el espacio. Alguien dice un número. Ese número de personas forma un grupo y se detiene. Los que sobran siguen. Sin hablar. Solo moverse hasta que el cuerpo entienda algo.",autor:"Augusto Boal, Teatro del Oprimido"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"Cada uno dice una sola palabra. El grupo construye una frase con todas las palabras en el orden en que se dijeron. Nadie puede cambiar nada. Lean la frase en voz alta. ¿De qué habla sin que nadie lo planeara?",autor:"Ejercicio de creación colectiva"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"Todo el grupo hace el mismo gesto al mismo tiempo, sin coordinarlo antes. Inténtenlo tres veces. Cuando salga, paren. Quédense en ese gesto un instante. ¿Qué dice ese gesto compartido?",autor:"Ejercicio de sincronía espontánea"},
    {tipo:"grupo",titulo:"Para el grupo",contenido:"Una persona cuenta algo que le pasó esta semana. El grupo escucha en silencio. Luego alguien reconstruye la misma historia cambiando solo el final. No para mejorarla. Para verla distinta.",autor:"Técnica narrativa colectiva"},

const TODAS = Object.values(CARTAS).flat();

const TIPO_META = {
  fluxus:    {label:"FLUXUS",    color:"#c4aff5"},
  grotowski: {label:"CUERPO",    color:"#a8d4f0"},
  surreal:   {label:"IMAGINAR",  color:"#a0f0c8"},
  teoria:    {label:"CONCEPTO",  color:"#f5f0ec"},
  grupo:     {label:"COLECTIVO", color:"#f0c8a0"},
};

const PREGUNTAS = [
  {texto:"¿Cómo llegaste hoy?",          opciones:["Con el cuerpo","Con la mente","A medias","No sé todavía"]},
  {texto:"¿Qué estás imaginando ahora?", opciones:["Algo concreto","Algo abstracto","Nada / vacío","No quiero decir"]},
  {texto:"¿Qué necesitás hoy?",          opciones:["Moverme","Pensar","Silencio","Que algo me sorprenda"]},
  {texto:"¿Dónde está tu atención?",     opciones:["En el cuerpo","En el espacio","En otra parte","No lo sé"]},
];

const MAPA = {
  "Con el cuerpo":["grotowski","fluxus","grupo"], "Con la mente":["teoria","surreal","fluxus"],
  "A medias":["surreal","grotowski","teoria"],     "No sé todavía":["fluxus","surreal","grupo"],
  "Algo concreto":["grotowski","fluxus","teoria"], "Algo abstracto":["surreal","teoria","fluxus"],
  "Nada / vacío":["grotowski","fluxus","surreal"], "No quiero decir":["surreal","grotowski","grupo"],
  "Moverme":["grotowski","fluxus","grupo"],         "Pensar":["teoria","surreal","fluxus"],
  "Silencio":["grotowski","surreal","fluxus"],      "Que algo me sorprenda":["fluxus","surreal","grupo"],
  "En el cuerpo":["grotowski","fluxus","grupo"],    "En el espacio":["fluxus","grotowski","surreal"],
  "En otra parte":["surreal","teoria","fluxus"],    "No lo sé":["surreal","fluxus","grupo"],
};

const RITUAL_LINES = [
  "Encontramos el oro de nuestros días.",
  "Movemos lo invisible.",
  "Creamos nuestro sol.",
  "Nos fundamos en nuestro imaginario.",
];

const ORO_WORDS = ["oro","días","luz","cuerpo","imaginar","invisible","presente","ritual","sueño","sol","silencio","umbral","origen","raíz","tiempo","espacio","fuego","aire","voz"];
const BOSQUE_MSGS = ["Encontraste el oro de tus días.","La luz sos vos.","Moviste lo invisible.","El cuerpo sabe el camino.","Cada partícula, una memoria.","Seguís tu propio rastro."];

// ═══════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════
let archivo = [];
let tiposActuales = [];
let cartaActual = null;
let preguntaActual = null;
let proyCartaActual = null;

const rnd = arr => arr[Math.floor(Math.random()*arr.length)];
const rn  = (a,b) => Math.random()*(b-a)+a;
const randFrom = t => rnd(CARTAS[t]);

// ═══════════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-'+id);
  if (el) el.classList.add('active');
  // nav
  const noNav = ['cdd','ritual','bosque','chat'];
  const nav = document.getElementById('nav');
  nav.classList.toggle('hidden', noNav.includes(id));
  // bosque especial
  document.getElementById('screen-bosque').classList.toggle('hidden', id !== 'bosque');
  actualizarArchivoNav();
  window.scrollTo(0,0);
}

function actualizarArchivoNav() {
  const btn = document.getElementById('nav-archivo');
  btn.textContent = archivo.length > 0 ? `archivo (${archivo.length})` : 'archivo';
}

// ═══════════════════════════════════════════════════════════
// CARTA DEL DÍA
// ═══════════════════════════════════════════════════════════
function initCartaDelDia() {
  const d = new Date();
  const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  const narrativas = TODAS.filter(c => c.narrativa);
  const carta = narrativas[seed % narrativas.length];
  const col = TIPO_META[carta.tipo]?.color || '#c4aff5';

  document.getElementById('cdd-fecha').textContent =
    d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('cdd-label').style.color = col+'99';
  document.getElementById('cdd-label').textContent = 'carta del día';

  document.getElementById('cdd-sobre').innerHTML = renderSobreCerrado(carta, 'abrirCDD()');
  document.getElementById('btn-entrar-circulo').style.display = 'none';
}

function abrirCDD() {
  const d = new Date();
  const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  const narrativas = TODAS.filter(c => c.narrativa);
  const carta = narrativas[seed % narrativas.length];
  document.getElementById('cdd-sobre').innerHTML = renderSobreAbierto(carta);
  const btn = document.getElementById('btn-entrar-circulo');
  btn.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════
// RITUAL
// ═══════════════════════════════════════════════════════════
function irRitual() {
  showScreen('ritual');
  const cont = document.getElementById('ritual-lines');
  const btns = document.getElementById('ritual-btns');
  cont.innerHTML = '';
  btns.style.opacity = '0';
  btns.style.animation = 'none';
  RITUAL_LINES.forEach((l, i) => {
    const p = document.createElement('p');
    p.className = 'rl';
    p.style.animationDelay = (i === 0 ? 1.2 : 1.2 + i*1.8) + 's';
    p.style.color = i === 3 ? '#f5f0ec' : `rgba(245,240,236,${.35+i*.15})`;
    p.textContent = l;
    cont.appendChild(p);
  });
  setTimeout(() => {
    btns.style.animation = 'ap .7s .2s both';
    btns.style.opacity = '';
  }, 1200 + RITUAL_LINES.length * 1800);
}

// ═══════════════════════════════════════════════════════════
// PREGUNTA
// ═══════════════════════════════════════════════════════════
function irPregunta() {
  preguntaActual = PREGUNTAS[Math.floor(Math.random()*PREGUNTAS.length)];
  document.getElementById('pregunta-txt').textContent = preguntaActual.texto;
  const cont = document.getElementById('opciones');
  cont.innerHTML = '';
  preguntaActual.opciones.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.animationDelay = (i*.07) + 's';
    btn.style.animation = 'ap .52s ease both';
    btn.textContent = op;
    btn.onclick = () => elegir(op);
    cont.appendChild(btn);
  });
  showScreen('pregunta');
}

function elegirAzar() {
  if (!preguntaActual) return;
  const op = rnd(preguntaActual.opciones);
  elegir(op);
}

function elegir(op) {
  const tipos = MAPA[op] || ['fluxus','surreal','grotowski'];
  tiposActuales = tipos;
  const tipo = rnd(tipos);
  mostrarCarta(randFrom(tipo));
}

// ═══════════════════════════════════════════════════════════
// CARTA
// ═══════════════════════════════════════════════════════════
function mostrarCarta(carta) {
  cartaActual = carta;
  const mc = TIPO_META[carta.tipo];
  document.getElementById('carta-label').textContent = '— ' + (mc?.label || '');
  document.getElementById('carta-label').style.color = (mc?.color || '#f5f0ec') + '77';
  document.getElementById('carta-sobre').innerHTML = renderSobreCerrado(carta, 'abrirCartaActual()');
  document.getElementById('carta-acciones').classList.add('hidden');
  document.getElementById('nota-txt').value = '';
  const bg = document.getElementById('btn-guardar');
  bg.textContent = 'guardar en el archivo';
  bg.classList.remove('saved');
  renderTipoBtns();
  showScreen('carta');
}

function abrirCartaActual() {
  if (!cartaActual) return;
  document.getElementById('carta-sobre').innerHTML = renderSobreAbierto(cartaActual);
  document.getElementById('carta-acciones').classList.remove('hidden');
}

function renderTipoBtns() {
  const cont = document.getElementById('tipo-btns');
  cont.innerHTML = '';
  const todos = Object.keys(TIPO_META);
  const primero = tiposActuales.filter(t => todos.includes(t));
  const resto   = todos.filter(t => !tiposActuales.includes(t));
  [...primero, ...resto].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tipo-btn';
    const col = TIPO_META[t].color;
    if (tiposActuales.includes(t)) {
      btn.style.color = col;
      btn.style.borderColor = col + '2a';
    }
    btn.textContent = TIPO_META[t].label;
    btn.onclick = () => mostrarCarta(randFrom(t));
    cont.appendChild(btn);
  });
}

function guardar() {
  if (!cartaActual) return;
  const nota = document.getElementById('nota-txt').value;
  archivo.unshift({
    ...cartaActual,
    nota,

// BOSQUE
// ═══════════════════════════════════════════════════════════
let bosqueRaf = null;
let bosqueState = null;
let bosqueKeys = {};
let bosquePtId = null;
let bosqueDir = {ax:0, ay:0};

function irBosque() {
  showScreen('bosque');
  setTimeout(initBosque, 60);
}

function salirBosque() {
  if (bosqueRaf) cancelAnimationFrame(bosqueRaf);
  if (bosqueState) bosqueState.alive = false;
  bosqueRaf = null; bosqueState = null;
  document.getElementById('bosque-msg').style.display = 'none';
  irPregunta();
}

function initBosque() {
  if (bosqueRaf) cancelAnimationFrame(bosqueRaf);

  const cv = document.getElementById('bosque-canvas');
  const wrap = document.getElementById('bosque-wrap');
  const W = cv.width  = wrap.offsetWidth  || window.innerWidth;
  const H = cv.height = wrap.offsetHeight || window.innerHeight;
  const ctx = cv.getContext('2d');

  const mkOro = () => ({
    x:rn(28,W-28), y:rn(55,H-90), r:rn(3,5),
    word:rnd(ORO_WORDS), ph:rn(0,Math.PI*2), sp:rn(.006,.015),
    collected:false, pop:0
  });

  bosqueState = {
    alive:true, tick:0, total:0, par:[],
    p:{x:W/2, y:H/2, vx:0, vy:0, trail:[]},
    oros: Array.from({length:11}, mkOro),
    ff: Array.from({length:12}, () => ({
      x:rn(0,W), y:rn(H*.32,H*.84), vx:rn(-.24,.24), vy:rn(-.12,.12),
      ph:rn(0,Math.PI*2), r:rn(.8,1.8), col:Math.random()>.5?"#a0e87a":"#e8d07a"
    })),
    trees: Array.from({length:20}, () => ({
      x:rn(10,W-10), by:H-rn(8,58), h:rn(44,112),
      layers:Math.floor(rn(2,4)), dark:rn(.6,1),
      sw:rn(0,Math.PI*2), sws:rn(.003,.007)
    })).sort((a,b) => a.dark-b.dark),
    fog: Array.from({length:3}, (_,i) => ({y:H*.64+i*24, a:.011+i*.009, sp:.055+i*.03, off:rn(0,W)})),
    stars: Array.from({length:50}, () => ({x:rn(0,W), y:rn(0,H*.48), r:rn(.3,1.2), ph:rn(0,Math.PI*2)})),
    moon: {x:W*.8, y:44, r:19},
    mkOro,
  };

  const drawTree = (t) => {
    t.sw += t.sws;
    const sw = Math.sin(t.sw)*1.7;
    const g = Math.floor(8+t.dark*11), gn = Math.floor(15+t.dark*17);
    for (let l=0; l<t.layers; l++) {
      const ly = t.by - t.h*(.36+l*.21);
      const lw = (t.h*.5)*(1-l*.2) + sw*(l+1)*.4;
      ctx.beginPath();
      ctx.moveTo(t.x+sw*(l*.3), ly-t.h*.19);
      ctx.lineTo(t.x-lw/2+sw*(l*.2), ly+t.h*.09);
      ctx.lineTo(t.x+lw/2+sw*(l*.2), ly+t.h*.09);
      ctx.closePath();
      ctx.fillStyle = `rgba(${g},${gn},${g},1)`;
      ctx.fill();
    }
    ctx.fillStyle = "rgba(7,5,2,1)";
    ctx.fillRect(t.x-2.5+sw*.07, t.by-t.h*.32, 5, t.h*.35);
  };

  let msgTimer = null;
  const showMsg = (txt) => {
    const el = document.getElementById('bosque-msg');
    el.textContent = txt;
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'bmp .44s ease both';
    clearTimeout(msgTimer);
    msgTimer = setTimeout(() => { el.style.display = 'none'; }, 2400);
  };

  const loop = () => {
    const s = bosqueState;
    if (!s || !s.alive) return;
    s.tick++;

    let ax = bosqueDir.ax, ay = bosqueDir.ay;
    if (bosqueKeys['ArrowLeft']||bosqueKeys['a']) ax -= 1;
    if (bosqueKeys['ArrowRight']||bosqueKeys['d']) ax += 1;
    if (bosqueKeys['ArrowUp']||bosqueKeys['w']) ay -= 1;
    if (bosqueKeys['ArrowDown']||bosqueKeys['s']) ay += 1;
    const l = Math.hypot(ax,ay);
    if (l > 0) { ax /= l; ay /= l; }

    s.p.vx = s.p.vx*.82 + ax*2.9*.18;
    s.p.vy = s.p.vy*.82 + ay*2.9*.18;
    s.p.x = Math.max(10, Math.min(W-10, s.p.x+s.p.vx));
    s.p.y = Math.max(10, Math.min(H-10, s.p.y+s.p.vy));
    s.p.trail.unshift({x:s.p.x, y:s.p.y});
    if (s.p.trail.length > 20) s.p.trail.pop();

    s.oros.forEach(o => {
      if (o.collected) { o.pop--; return; }
      o.ph += o.sp;
      o.x += Math.sin(o.ph)*.22;
      o.y += Math.cos(o.ph*.7)*.17;
      if (o.x<18) o.x=18; if (o.x>W-18) o.x=W-18;
      if (o.y<35) o.y=35; if (o.y>H-68) o.y=H-68;
      if (Math.hypot(s.p.x-o.x, s.p.y-o.y) < 18) {
        o.collected=true; o.pop=44; s.total++;
        document.getElementById('bosque-canvas'); // score via canvas text
        for (let i=0;i<11;i++) s.par.push({x:o.x,y:o.y,vx:rn(-2.2,2.2),vy:rn(-2.6,.3),life:1,r:rn(1.3,3.2),col:Math.random()>.5?"#E8C97A":"#f0e8d8"});
        if (s.total % 5 === 0) showMsg(rnd(BOSQUE_MSGS));
        const idx = s.oros.indexOf(o);
        setTimeout(() => { if (!s.alive) return; if (idx>-1) s.oros[idx] = s.mkOro(); }, 2600);
      }
    });

    s.ff.forEach(f => {
      f.ph+=.018; f.x+=f.vx+Math.sin(f.ph)*.3; f.y+=f.vy+Math.cos(f.ph*.6)*.25;
      if(f.x<4||f.x>W-4) f.vx*=-1;
      if(f.y<H*.26||f.y>H-28) f.vy*=-1;
    });

    s.par.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=.05; p.life-=.023; p.vx*=.93; });
    s.par = s.par.filter(p => p.life > 0);

    // DRAW
    const sg = ctx.createLinearGradient(0,0,0,H);
    sg.addColorStop(0,"#020a04"); sg.addColorStop(.55,"#050f06"); sg.addColorStop(1,"#081208");
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

    s.stars.forEach(st => {
      st.ph+=.004; ctx.globalAlpha=.18+Math.sin(st.ph)*.18;
      ctx.fillStyle="#f0e8d8"; ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
    }); ctx.globalAlpha=1;

    ctx.shadowBlur=10; ctx.shadowColor="rgba(240,232,180,.28)";
    ctx.fillStyle="#f5f0d8"; ctx.globalAlpha=.76;
    ctx.beginPath(); ctx.arc(s.moon.x,s.moon.y,s.moon.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    s.trees.filter(t=>t.dark<.8).forEach(drawTree);

    s.ff.forEach(f => {
      ctx.shadowBlur=5; ctx.shadowColor=f.col;
      ctx.globalAlpha=.22+Math.sin(f.ph*2)*.26;
      ctx.fillStyle=f.col; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
    }); ctx.globalAlpha=1; ctx.shadowBlur=0;

    s.oros.forEach(o => {
      if (o.collected && o.pop > 0) {
        const a = o.pop/44;
        ctx.globalAlpha=a; ctx.font=`bold ${Math.floor(8+(1-a)*5)}px monospace`;
        ctx.fillStyle="#E8C97A"; ctx.shadowBlur=7; ctx.shadowColor="#E8C97A";
        ctx.textAlign="center"; ctx.fillText(o.word.toUpperCase(),o.x,o.y-(1-a)*22);
        ctx.textAlign="left"; ctx.globalAlpha=1; ctx.shadowBlur=0; return;
      }
      if (o.collected) return;
      const pulse = .6+Math.sin(s.tick*.05+o.ph)*.3;
      ctx.shadowBlur=9; ctx.shadowColor="#E8C97A";
      const og = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*2);
      og.addColorStop(0,"rgba(240,210,100,.82)"); og.addColorStop(.5,"rgba(220,170,60,.38)"); og.addColorStop(1,"transparent");
      ctx.globalAlpha=pulse; ctx.fillStyle=og; ctx.beginPath(); ctx.arc(o.x,o.y,o.r*2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#f5e090"; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
    });

    s.trees.filter(t=>t.dark>=.8).forEach(drawTree);

    s.fog.forEach(f => {
      f.off = (f.off+f.sp)%W;
      const fg = ctx.createLinearGradient(0,f.y,0,f.y+28);
      fg.addColorStop(0,"transparent"); fg.addColorStop(.5,`rgba(142,192,142,${f.a})`); fg.addColorStop(1,"transparent");
      ctx.fillStyle=fg; ctx.fillRect(-f.off,f.y,W*2,28);
    });

    s.par.forEach(p => {
      ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.shadowBlur=4; ctx.shadowColor=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }); ctx.globalAlpha=1;

    s.p.trail.forEach((pt,i) => {
      ctx.globalAlpha=(1-i/s.p.trail.length)*.18; ctx.fillStyle="#f0e8d8";
      ctx.beginPath(); ctx.arc(pt.x,pt.y,7*(1-i/s.p.trail.length)*.65,0,Math.PI*2); ctx.fill();
    }); ctx.globalAlpha=1;

    ctx.shadowBlur=18; ctx.shadowColor="#f0e8d8";
    const pg = ctx.createRadialGradient(s.p.x,s.p.y,0,s.p.x,s.p.y,9);
    pg.addColorStop(0,"#fff"); pg.addColorStop(.4,"#f0e8d8"); pg.addColorStop(1,"transparent");
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(s.p.x,s.p.y,9,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

    ctx.font="10px monospace"; ctx.fillStyle="rgba(240,210,100,.45)"; ctx.fillText(`◈ ${s.total}`,10,17);

    bosqueRaf = requestAnimationFrame(loop);
  };

  bosqueRaf = requestAnimationFrame(loop);
}

// ── Joystick (pointer events) ──
(function() {
  const base = document.getElementById('joystick-base');
  const knob = document.getElementById('joystick-knob');
  const R = 40;
  let ptId = null;

  function move(cx, cy) {
    const rect = base.getBoundingClientRect();
    const dx = cx - (rect.left+rect.width/2);
    const dy = cy - (rect.top+rect.height/2);
    const d  = Math.hypot(dx,dy), cl = Math.min(d,R);
    const nx = d>0?(dx/d)*cl:0, ny = d>0?(dy/d)*cl:0;
    knob.style.transform = `translate(calc(-50% + ${nx}px),calc(-50% + ${ny}px))`;
    bosqueDir = {ax: d>5?dx/d:0, ay: d>5?dy/d:0};
  }
  function stop() {
    ptId = null;
    knob.style.transform = 'translate(-50%,-50%)';
    bosqueDir = {ax:0, ay:0};
  }

  base.addEventListener('pointerdown',  e => { if(ptId!=null)return; ptId=e.pointerId; base.setPointerCapture(e.pointerId); move(e.clientX,e.clientY); });
  base.addEventListener('pointermove',  e => { if(e.pointerId!==ptId)return; move(e.clientX,e.clientY); });
  base.addEventListener('pointerup',    e => { if(e.pointerId!==ptId)return; stop(); });
  base.addEventListener('pointercancel',e => { if(e.pointerId!==ptId)return; stop(); });
})();

  document.getElementById('chat-input').value = '';
  document.getElementById('screen-chat').classList.remove('hidden');
  document.getElementById('screen-chat').style.display = 'flex';

  // Mensaje diagnóstico inicial de Claude
  agregarMensaje('claude', cfg.diagnostica);
  chatHistory.push({ role: 'assistant', content: cfg.diagnostica });
  window.scrollTo(0,0);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function agregarMensaje(rol, texto) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = `msg msg-${rol}`;
  div.innerHTML = `<div class="msg-bubble">${texto.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function agregarTyping() {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg msg-claude msg-typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-bubble"><span class="dot">·</span><span class="dot">·</span><span class="dot">·</span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function quitarTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function enviarMensaje() {
  if (chatCargando) return;
  const input = document.getElementById('chat-input');
  const texto = input.value.trim();
  if (!texto) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('btn-send').disabled = true;
  chatCargando = true;

  agregarMensaje('user', texto);
  chatHistory.push({ role: 'user', content: texto });

  agregarTyping();

  try {
    const cfg = AREAS[chatArea];
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: cfg.sistema,
        messages: chatHistory,
      })
    });

    const data = await resp.json();
    quitarTyping();

    const respTexto = data.content
      ? data.content.filter(b => b.type === 'text').map(b => b.text).join('\n')
      : 'Algo salió mal. ¿Podés intentar de nuevo?';

    agregarMensaje('claude', respTexto);
    chatHistory.push({ role: 'assistant', content: respTexto });

  } catch(e) {
    quitarTyping();
    agregarMensaje('claude', 'Hubo un problema de conexión. ¿Tenés internet? Intentá de nuevo.');
  }

  chatCargando = false;
  document.getElementById('btn-send').disabled = false;
}

// ── Service Worker (PWA offline) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
